<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="Orange gradient cover · white text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--gradient-brand); color: #fff; font-family: var(--font-deck); position: relative; box-sizing: border-box; padding: 96px 96px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .eyebrow { font-family: var(--font-mono); font-size: 18px; text-transform: uppercase; letter-spacing: .14em; color: rgba(255,255,255,.85); margin-bottom: 28px; }
  h1 { font-weight: 800; font-size: 84px; line-height: 1.02; letter-spacing: -.03em; margin: 0; max-width: 980px; text-wrap: balance; }
  .sub { font-family: var(--font-deck-body); font-size: 26px; color: rgba(255,255,255,.92); margin-top: 28px; max-width: 720px; line-height: 1.45; }
  .wm { position: absolute; bottom: 48px; left: 96px; font-family: var(--font-deck); font-weight: 800; font-size: 26px; letter-spacing: -.04em; }
  .wm .dot { color: var(--color-ink); }
  .foot { position: absolute; bottom: 50px; right: 96px; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,.8); }
</style>
</head>
<body>
  <div class="slide">
    <div class="eyebrow">Field Service · 2026</div>
    <h1>Run service from first call to final invoice</h1>
    <div class="sub">How AI is taking the busywork out of dispatch, quoting, and getting paid.</div>
    <div class="wm"><img src="../assets/logos/zuper-horizontal-white.png" alt="Zuper" style="height:30px;width:auto;display:block;"></div>
    <div class="foot">Q3 Business Review</div>
  </div>
</body>
</html>
