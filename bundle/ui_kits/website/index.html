<!-- @startingPoint section="Website" subtitle="Zuper marketing homepage" viewport="1200x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Zuper — Marketing site</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); color: var(--text-primary); }
  .zcard:hover { transform: translateY(-3px); box-shadow: var(--shadow-float); }
  .zmega:hover { background: var(--surface-hover); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="parts.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel">
    function App() {
      const [menuOpen, setMenuOpen] = React.useState(false);
      return (
        <div>
          <window.Header menuOpen={menuOpen} onToggleMenu={() => setMenuOpen(o => !o)} />
          <window.Hero />
          <window.ProductGrid />
          <window.Industries />
          <window.FeatureDark />
          <window.CTA />
          <window.Footer />
        </div>
      );
    }
    (function waitMount(){
      if (window.Header && window.Hero && window.Footer) {
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
      } else { setTimeout(waitMount, 40); }
    })();
  </script>
</body>
</html>
