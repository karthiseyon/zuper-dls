<!-- @dsCard group="Brand" viewport="700x200" name="Logomark & vertical lockup" subtitle="The standalone mark and stacked lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; height: 200px; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .cell img.mark { height: 64px; width: auto; }
  .cell img.vert { height: 110px; width: auto; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background:var(--surface-white);border-right:1px solid var(--border-card)"><img class="mark" src="../assets/logos/zuper-logomark.png" alt="Zuper mark"><span class="cap">Logomark</span></div>
    <div class="cell" style="background:var(--surface-charcoal)"><img class="mark" src="../assets/logos/zuper-logomark-white.png" alt="Zuper mark white"><span class="cap" style="color:#A1A1AA">White</span></div>
    <div class="cell" style="background:#09090B"><img class="mark" src="../assets/logos/zuper-logomark-inverted.png" alt="Zuper mark inverted"><span class="cap" style="color:#A1A1AA">Inverted</span></div>
    <div class="cell" style="background:var(--surface-warm)"><img class="vert" src="../assets/logos/zuper-vertical.png" alt="Zuper vertical lockup"><span class="cap">Vertical lockup</span></div>
  </div>
</body>
</html>
