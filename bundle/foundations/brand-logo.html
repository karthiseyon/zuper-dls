<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 200px; }
  .cell { display: flex; align-items: center; justify-content: center; }
  .cell img { height: 40px; width: auto; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background:var(--surface-white)"><img src="../assets/logos/zuper-horizontal.png" alt="Zuper"></div>
    <div class="cell" style="background:var(--surface-charcoal)"><img src="../assets/logos/zuper-horizontal-white.png" alt="Zuper"></div>
    <div class="cell" style="background:var(--gradient-brand)"><img src="../assets/logos/zuper-horizontal-white.png" alt="Zuper"></div>
  </div>
</body>
</html>
