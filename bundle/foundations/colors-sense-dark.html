<!-- @dsCard group="Colors" viewport="700x160" name="Zuper Sense Dark" subtitle="Dark theme — reserved for the AI command center only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: #09090B; padding: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .sw { width: calc(20% - 8px); }
  .chip { height: 44px; border-radius: var(--radius-sm); border: 1px solid #27272A; }
  .name { font-size: 11px; font-weight: 600; color: #FAFAFA; margin-top: 5px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: #71717A; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#09090B"></div><div class="name">BG</div><div class="hex">09090B</div></div>
    <div class="sw"><div class="chip" style="background:#141417"></div><div class="name">Surface 1</div><div class="hex">141417</div></div>
    <div class="sw"><div class="chip" style="background:#1C1C21"></div><div class="name">Surface 2</div><div class="hex">1C1C21</div></div>
    <div class="sw"><div class="chip" style="background:#27272A"></div><div class="name">Border</div><div class="hex">27272A</div></div>
    <div class="sw"><div class="chip" style="background:#FF8B5A"></div><div class="name">Orange/dark</div><div class="hex">FF8B5A</div></div>
  </div>
</body>
</html>
