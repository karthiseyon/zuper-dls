<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 48px; border-radius: var(--radius-sm); border: 1px solid var(--border-divider); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F3F4F6"></div><div class="hex">F3F4F6</div></div>
    <div class="sw"><div class="chip" style="background:#E5E7EB"></div><div class="hex">E5E7EB</div></div>
    <div class="sw"><div class="chip" style="background:#D1D5DB"></div><div class="hex">D1D5DB</div></div>
    <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="hex">9CA3AF</div></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="hex">6B7280</div></div>
    <div class="sw"><div class="chip" style="background:#374151"></div><div class="hex">374151</div></div>
    <div class="sw"><div class="chip" style="background:#111827"></div><div class="hex">111827</div></div>
  </div>
</body>
</html>
