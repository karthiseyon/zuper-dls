<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 20px; }
  .grad { height: 86px; border-radius: var(--radius-lg); background: var(--gradient-brand); display: flex; align-items: center; padding: 0 24px; }
  .grad span { font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,.92); }
  .cap { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="grad"><span>135deg · dark top-left → light bottom-right · #1C0A06 → #7E1C0B → #D43A14 → #F2864F</span></div>
  <div class="cap">Diagonal: darkest at the top-left corner, lightest at the bottom-right. Used on hero grounds, deck covers and the orange footer.</div>
</body>
</html>
