<!-- @dsCard group="Type" viewport="700x180" name="Display — Plus Jakarta Sans" subtitle="Hero & headlines · 700 · tight tracking · balanced wrap" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 24px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--color-primary); }
  .display { font-family: var(--font-display); font-weight: 700; letter-spacing: -.03em; line-height: 1.05; color: var(--text-primary); font-size: 52px; margin: 10px 0 4px; }
  .spec { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Display</div>
  <div class="display">Run service from<br>first call to invoice</div>
  <div class="spec">Plus Jakarta Sans · 700 · −0.03em · line-height 1.05</div>
</body>
</html>
