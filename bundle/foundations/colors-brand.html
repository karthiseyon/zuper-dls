<!-- @dsCard group="Colors" viewport="700x150" name="Brand Orange" subtitle="One vivid orange — one primary action per view" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; border-radius: var(--radius-card); overflow: hidden; border: 1px solid var(--border-card); }
  .chip { height: 72px; }
  .meta { padding: 8px 12px; }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-primary)"></div><div class="meta"><div class="name">Primary</div><div class="hex">#FD5000</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-primary-hover)"></div><div class="meta"><div class="name">Hover</div><div class="hex">#E04600</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-primary-press)"></div><div class="meta"><div class="name">Press</div><div class="hex">#DB3602</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-red-deep)"></div><div class="meta"><div class="name">Deep red</div><div class="hex">#B5271C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#191919</div></div></div>
  </div>
</body>
</html>
