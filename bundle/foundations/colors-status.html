<!-- @dsCard group="Colors" viewport="700x140" name="Semantic Status" subtitle="Success · warning · error — foreground on tinted background" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .pill { flex: 1; border-radius: var(--radius-md); padding: 14px 16px; }
  .label { font-size: 14px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; margin-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="pill" style="background:var(--status-success-bg);color:var(--status-success-fg)"><div class="label">Success</div><div class="hex">#1E854B / #E7F6EC</div></div>
    <div class="pill" style="background:var(--status-warning-bg);color:var(--status-warning-fg)"><div class="label">Warning</div><div class="hex">#A66A00 / #FEF3DC</div></div>
    <div class="pill" style="background:var(--status-error-bg);color:var(--status-error-fg)"><div class="label">Error</div><div class="hex">#C42121 / #FDECEC</div></div>
  </div>
</body>
</html>
