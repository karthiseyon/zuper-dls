<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 24px; }
  .eyebrow { font-family: var(--font-mono); font-size: 13px; text-transform: uppercase; letter-spacing: .1em; color: var(--color-primary); font-weight: 500; }
  .eyebrow + .eyebrow { margin-top: 14px; color: var(--text-tertiary); }
  .spec { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="eyebrow">Intelligent Quoting</div>
  <div class="eyebrow">Job Costing &amp; Profitability</div>
  <div class="spec">Geist Mono · uppercase · +0.1em · #FD5000</div>
</body>
</html>
