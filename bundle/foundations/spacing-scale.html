<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .u { text-align: center; }
  .bar { background: var(--color-primary); border-radius: 3px; width: 22px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
    <div class="u"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="n">48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="n">64</div></div>
    <div class="u"><div class="bar" style="height:96px"></div><div class="n">96</div></div>
  </div>
</body>
</html>
