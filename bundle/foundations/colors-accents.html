<!-- @dsCard group="Colors" viewport="700x130" name="Product Accents" subtitle="For charts, tags & illustrations — never primary actions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 56px; border-radius: var(--radius-md); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#22C55E"></div><div class="name">Green</div><div class="hex">22C55E</div></div>
    <div class="sw"><div class="chip" style="background:#A855F7"></div><div class="name">Purple</div><div class="hex">A855F7</div></div>
    <div class="sw"><div class="chip" style="background:#14B8A6"></div><div class="name">Teal</div><div class="hex">14B8A6</div></div>
    <div class="sw"><div class="chip" style="background:#EAB308"></div><div class="name">Yellow</div><div class="hex">EAB308</div></div>
    <div class="sw"><div class="chip" style="background:#EF4444"></div><div class="name">Red</div><div class="hex">EF4444</div></div>
    <div class="sw"><div class="chip" style="background:#3B82F6"></div><div class="name">Blue</div><div class="hex">3B82F6</div></div>
  </div>
</body>
</html>
