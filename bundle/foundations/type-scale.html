<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display → caption · the full web ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-white); padding: 22px 24px; color: var(--text-primary); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-card); }
  .r:last-child { border: 0; }
  .t { font-family: var(--font-display); font-weight: 700; letter-spacing: -.02em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="r"><div class="t" style="font-size:44px">Display 44</div><div class="tag">display-md</div></div>
  <div class="r"><div class="t" style="font-size:36px">Heading 36</div><div class="tag">h1</div></div>
  <div class="r"><div class="t" style="font-size:28px">Heading 28</div><div class="tag">h2</div></div>
  <div class="r"><div class="t" style="font-size:22px">Heading 22</div><div class="tag">h3</div></div>
  <div class="r"><div class="t" style="font-size:18px;font-family:var(--font-body);font-weight:400">Body large 18</div><div class="tag">body-lg</div></div>
  <div class="r"><div class="t" style="font-size:16px;font-family:var(--font-body);font-weight:400">Body 16 — default</div><div class="tag">body</div></div>
  <div class="r"><div class="t" style="font-size:14px;font-family:var(--font-body);font-weight:400;color:var(--text-secondary)">Body small 14</div><div class="tag">body-sm</div></div>
</body>
</html>
