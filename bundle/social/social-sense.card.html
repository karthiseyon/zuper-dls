<!-- @dsCard group="Social" viewport="400x400" name="Zuper Sense post" subtitle="1080×1080 — dark, Sense only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .post { width: 400px; height: 400px; box-sizing: border-box; background: #09090B url(../assets/backgrounds/zuper-sense-bg.jpg) center/cover; color: #FAFAFA; padding: 34px; position: relative; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: #FF8B5A; margin-bottom: 14px; }
  h2 { font-family: var(--font-display); font-weight: 800; font-size: 44px; line-height: 1.03; letter-spacing: -.03em; margin: 0; }
  p { font-size: 14px; line-height: 1.45; color: #A1A1AA; margin: 16px 0 0; max-width: 300px; }
  .logo { position: absolute; left: 34px; bottom: 30px; height: 20px; }
</style>
</head>
<body>
  <div class="post">
    <div class="eyebrow">Zuper Sense</div>
    <h2>AI that runs in the background</h2>
    <p>Auto-dispatch, job summaries and margin alerts — before the week is lost.</p>
    <img class="logo" src="../assets/logos/zuper-horizontal-white.png" alt="Zuper">
  </div>
</body>
</html>
