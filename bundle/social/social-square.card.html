<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .post { width: 400px; height: 400px; box-sizing: border-box; background: linear-gradient(135deg,#1C0A06 0%,#7E1C0B 30%,#D43A14 64%,#F2864F 100%); color: #fff; padding: 34px; position: relative; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: rgba(255,255,255,.85); margin-bottom: 14px; }
  h2 { font-family: var(--font-display); font-weight: 800; font-size: 46px; line-height: 1.02; letter-spacing: -.03em; margin: 0; }
  p { font-size: 15px; line-height: 1.45; color: rgba(255,255,255,.92); margin: 16px 0 0; max-width: 280px; }
  .logo { position: absolute; left: 34px; bottom: 30px; height: 20px; }
  .mh { position: absolute; right: 30px; bottom: 0; height: 56px; }
</style>
</head>
<body>
  <div class="post">
    <div class="eyebrow">Field service · AI</div>
    <h2>Win 1 in 3 quotes on-site</h2>
    <p>Build a branded estimate in the driveway — and send it before you leave.</p>
    <img class="logo" src="../assets/logos/zuper-horizontal-white.png" alt="Zuper">
    <img class="mh" src="../assets/mini-humans/reaching-up.gif" alt="">
  </div>
</body>
</html>
