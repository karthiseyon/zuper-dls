<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .post { width: 250px; height: 444px; box-sizing: border-box; background: #fff; color: var(--text-primary); padding: 28px 24px; position: relative; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .pipe { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(135deg,#1C0A06 0%,#7E1C0B 30%,#D43A14 64%,#F2864F 100%); }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--color-primary); margin-bottom: 12px; }
  h2 { font-family: var(--font-display); font-weight: 800; font-size: 34px; line-height: 1.03; letter-spacing: -.03em; margin: 0; }
  p { font-size: 13px; line-height: 1.45; color: var(--text-secondary); margin: 14px 0 18px; }
  .cta { align-self: flex-start; background: var(--color-primary); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 13px; padding: 9px 18px; border-radius: 8px; }
  .logo { position: absolute; left: 24px; bottom: 26px; height: 18px; }
  .mh { position: absolute; right: 18px; bottom: 0; height: 64px; }
</style>
</head>
<body>
  <div class="post">
    <div class="pipe"></div>
    <div class="eyebrow">The AI OS for field service</div>
    <h2>From first call to final invoice</h2>
    <p>Schedule the right tech, win the quote on-site, and get paid faster.</p>
    <span class="cta">Book a demo →</span>
    <img class="logo" src="../assets/logos/zuper-horizontal.png" alt="Zuper">
    <img class="mh" src="../assets/mini-humans/ready-to-work.gif" alt="">
  </div>
</body>
</html>
