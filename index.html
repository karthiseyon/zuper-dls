/* ===== Deck system — one deck, three modes ===== */
.modecards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px}
@media(max-width:760px){.modecards{grid-template-columns:1fr}}
.modecard{border:1px solid var(--border-default);border-radius:14px;padding:18px;background:var(--surface-card)}
.modecard .sw{height:46px;border-radius:9px;margin-bottom:12px}
.modecard h5{font-family:'Aptos Display','Aptos',sans-serif;font-weight:700;font-size:16px;margin:0 0 4px;color:var(--text-primary)}
.modecard p{margin:0;font-size:13px;color:var(--text-secondary);line-height:1.5}
.rulebar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--surface-subtle);border:1px solid var(--border-default);border-radius:12px;padding:16px 18px;margin-top:18px;font-size:14px;color:var(--text-secondary)}
.rulebar .tag{font-family:'Aptos','Segoe UI',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:6px 11px;border-radius:7px}
.rulebar .arr{color:var(--text-tertiary);font-weight:700}
.slidewrap{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:820px){.slidewrap{grid-template-columns:1fr}}
.dfig{display:flex;flex-direction:column;gap:9px}
.dcap{font-size:12.5px;color:var(--text-secondary)}
.dcap b{color:var(--text-primary);font-weight:600}
.dslide{aspect-ratio:16/9;border-radius:14px;overflow:hidden;position:relative;border:1px solid rgba(0,0,0,.10);display:flex;flex-direction:column;padding:26px 28px;font-family:'Aptos','Segoe UI',system-ui,sans-serif;background-size:cover;background-position:center}
.dslide .topbar{position:absolute;top:0;left:0;right:0;height:6px}
.dslide .deyebrow{font-weight:700;font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin:0}
.dslide h3{font-family:'Aptos Display','Aptos',sans-serif;font-weight:700;font-size:clamp(19px,2.5vw,28px);line-height:1.05;letter-spacing:-.02em;margin:10px 0 0;text-wrap:balance}
.dslide .dbody{font-size:12.5px;line-height:1.5;margin-top:9px;opacity:.92;max-width:34ch}
.dslide ul.dlist{margin:12px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px;font-size:12.5px}
.dslide ul.dlist li{display:flex;gap:9px;align-items:flex-start}
.dslide ul.dlist li::before{content:"";width:7px;height:7px;border-radius:2px;margin-top:5px;background:currentColor;flex:0 0 auto;opacity:.85}
.dslide .dfoot{margin-top:auto;display:flex;align-items:center;gap:12px;padding-top:14px}
.dslide .dfoot .src{font-size:11px;opacity:.7;margin-left:auto}
.dslide .dnum{font-family:'Aptos Display','Aptos',sans-serif;font-weight:700;font-size:clamp(48px,8vw,82px);line-height:.85;letter-spacing:-.03em}
.dslide .dstat{font-family:'Aptos Display','Aptos',sans-serif;font-weight:700;font-size:clamp(52px,9vw,92px);line-height:.9;letter-spacing:-.03em}
.dslide .dbars{display:flex;align-items:flex-end;gap:9px;height:42%;margin-top:14px}
.dslide .dquote{font-family:'Aptos Display','Aptos',sans-serif;font-weight:700;font-size:clamp(18px,2.4vw,26px);line-height:1.25;letter-spacing:-.01em}
.dslide.white{background-color:#fff;color:#1B1919}
.dslide.white .deyebrow{color:#FD5000}
.dslide.white .hl{color:#FD5000}
.dslide.orange{color:#fff}
.dslide.orange .deyebrow{color:#FFE0CE}
.dslide.dark{color:#FAFAFA}
.dslide.dark .deyebrow{color:#FF8B5A}
/* ===== Case study / one-pager system ===== */
.cs-sech{display:flex;align-items:center;gap:16px;margin:0 0 16px}
.cs-sech h4{font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:-.02em;color:var(--text-primary);margin:0;white-space:nowrap}
.cs-sech .rule{height:3px;background:var(--brand-default);border-radius:2px;flex:1}
.cs-cover{border-radius:18px;overflow:hidden;color:#fff;padding:38px 40px;background-size:cover;background-position:center}
.cobrand{display:flex;align-items:center;gap:14px}
.cobrand .div{width:1px;height:26px;background:rgba(255,255,255,.45)}
.cobrand .clogo{font-family:var(--display);font-weight:800;font-size:13px;letter-spacing:.02em;color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:7px;padding:6px 11px;line-height:1}
.cs-cover h3{font-family:var(--display);font-weight:700;font-size:clamp(23px,3.2vw,36px);line-height:1.07;letter-spacing:-.025em;margin:26px 0 16px;max-width:24ch;text-wrap:balance}
.cs-cover p{font-size:14px;line-height:1.6;color:rgba(255,255,255,.9);max-width:62ch;margin:0}
.runin{font-size:14px;line-height:1.62;color:var(--text-secondary);margin:0 0 14px}
.runin b{color:var(--brand-default)}
.pullq{position:relative;padding:6px 0 6px 52px;margin:4px 0}
.pullq::before{content:"\201C";position:absolute;left:-2px;top:2px;font-family:var(--display);font-weight:700;font-size:58px;line-height:1;color:var(--brand-default)}
.pullq .q{font-size:16.5px;line-height:1.5;color:var(--text-primary);font-weight:500}
.pullq .a{font-size:13px;color:var(--text-secondary);margin-top:10px}
.pullq .a b{color:var(--text-primary)}
.cstable{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border-default);border-radius:14px;overflow:hidden;font-size:13.5px}
.cstable th{font-family:var(--display);font-weight:700;text-align:left;padding:14px 16px;color:var(--text-primary);border-bottom:1px solid var(--border-default);background:var(--surface-subtle)}
.cstable td{padding:13px 16px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);vertical-align:top}
.cstable tr:last-child td{border-bottom:none}
.cstable td.area{font-weight:600;color:var(--text-primary)}
.cstable td.aft{color:var(--text-primary)}
.tcard{display:flex;gap:22px;border:1px solid var(--border-default);border-radius:18px;padding:24px;background:var(--surface-card);flex-wrap:wrap;align-items:flex-start}
.tcard .photo{width:118px;height:140px;border-radius:12px;background:linear-gradient(135deg,#7a736a,#3a352f);flex:0 0 auto;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-weight:700;font-family:var(--display);font-size:30px;padding-bottom:12px}
.tcard .body{flex:1;min-width:240px}
.tcard .body p{font-size:14.5px;line-height:1.6;color:var(--text-primary);margin:0 0 14px}
.tcard .who{font-size:13.5px;color:var(--text-secondary)}
.tcard .who b{color:var(--text-primary)}
.cobrand-foot{display:flex;align-items:center;gap:12px}
.cobrand-foot .div{width:1px;height:22px;background:var(--border-default)}
.cobrand-foot .clogo{font-family:var(--display);font-weight:800;font-size:12px;color:var(--text-primary);border:1.5px solid var(--border-default);border-radius:6px;padding:5px 9px}
.cs-grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
@media(max-width:760px){.cs-grid2{grid-template-columns:1fr}}
.statbig{border:1px solid var(--border-default);border-radius:16px;padding:24px;background:var(--surface-cream)}
.statbig .n{font-family:var(--display);font-weight:700;font-size:52px;letter-spacing:-.03em;color:var(--brand-default);line-height:1}
.statbig .l{font-size:14px;color:var(--text-secondary);margin-top:6px}
/* ===== Case study — realistic document pages ===== */
.cs-ribbon{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.cs-ribbon .r{flex:1;min-width:150px;border:1px solid var(--border-default);border-radius:14px;padding:16px 18px;background:var(--surface-card)}
.cs-ribbon .r .n{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.02em;color:var(--brand-default);line-height:1}
.cs-ribbon .r .l{font-size:12.5px;color:var(--text-secondary);margin-top:5px;line-height:1.4}
.docnote{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary);margin:0 0 14px}
.docstrip{display:flex;gap:30px;overflow-x:auto;padding:10px 2px 26px;scroll-snap-type:x mandatory}
.docstrip::-webkit-scrollbar{height:9px}
.docstrip::-webkit-scrollbar-track{background:transparent}
.docstrip::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:9px}
.page{flex:0 0 auto;width:452px;aspect-ratio:1/1.414;border-radius:8px;overflow:hidden;background:#fff;position:relative;display:flex;flex-direction:column;scroll-snap-align:center;box-shadow:0 24px 60px rgba(20,4,3,.16),0 3px 8px rgba(0,0,0,.07)}
.page .pad{padding:30px 32px 24px;display:flex;flex-direction:column;height:100%}
.page.cover{color:#fff;background-size:cover;background-position:center}
.page .pnum{position:absolute;bottom:11px;right:15px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.08em;opacity:.45}
.cobrand-sm{display:flex;align-items:center;gap:10px}
.cobrand-sm .div{width:1px;height:18px;background:rgba(255,255,255,.45)}
.cobrand-sm .clogo{font-family:var(--display);font-weight:800;font-size:8.5px;letter-spacing:.02em;border:1.3px solid rgba(255,255,255,.5);border-radius:5px;padding:4px 7px;line-height:1}
.cobrand-sm.dark .div{background:var(--border-default)}
.cobrand-sm.dark .clogo{color:#191919;border-color:var(--border-default)}
.page .cv-h{font-family:var(--display);font-weight:700;font-size:26px;line-height:1.07;letter-spacing:-.025em;margin:0 0 13px;text-wrap:balance}
.page .cv-h .sub{display:block;font-size:12.5px;font-weight:600;opacity:.92;margin-top:9px;letter-spacing:-.005em;line-height:1.3}
.page .cv-tag{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.85);margin:14px 0 0}
.page p.cp{font-size:10px;line-height:1.55;margin:0 0 8px}
.page.cover p.cp{color:rgba(255,255,255,.9)}
.page .psech{display:flex;align-items:center;gap:10px;margin:0 0 11px}
.page .psech h6{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:-.01em;color:#191919;margin:0;white-space:nowrap}
.page .psech .ru{height:2.5px;background:#FD5000;border-radius:2px;flex:1}
.page .ri{font-size:10px;line-height:1.55;color:#4B5563;margin:0 0 8px}
.page .ri b{color:#FD5000}
.page .pquote{position:relative;padding-left:28px;margin:11px 0}
.page .pquote::before{content:"\201C";position:absolute;left:-3px;top:-10px;font-family:var(--display);font-weight:700;font-size:40px;color:#FD5000;line-height:1}
.page .pquote .q{font-size:11.5px;line-height:1.45;color:#191919;font-weight:500}
.page .pquote .a{font-size:9.5px;color:#606063;margin-top:7px}
.page table.pt{width:100%;border-collapse:collapse;font-size:8.7px;margin-top:2px}
.page table.pt th{text-align:left;font-family:var(--display);font-weight:700;color:#191919;padding:6px 7px;border-bottom:1.5px solid #E6E6E6}
.page table.pt td{padding:6px 7px;border-bottom:1px solid #F2F2F2;color:#4B5563;vertical-align:top;line-height:1.35}
.page table.pt tr:last-child td{border-bottom:none}
.page table.pt td.a{font-weight:600;color:#191919}
.page .pfoot{margin-top:auto;padding-top:12px;border-top:1px solid #F0F0F0;display:flex;align-items:center;justify-content:space-between}
.page .pfoot .src{font-family:'Geist Mono',monospace;font-size:8px;color:#9a948e;letter-spacing:.06em}
.page .tcard-sm{display:flex;gap:11px;border:1px solid #E6E6E6;border-radius:11px;padding:12px;margin-top:8px}
.page .tcard-sm .ph{width:44px;height:52px;border-radius:8px;background:linear-gradient(135deg,#7a736a,#3a352f);flex:0 0 auto;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-family:var(--display);font-weight:700;font-size:13px;padding-bottom:6px}
.page .tcard-sm .q{font-size:9.5px;line-height:1.45;color:#191919;font-weight:500}
.page .tcard-sm .a{font-size:8.5px;color:#606063;margin-top:6px}
.anat{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.anat{grid-template-columns:1fr}.page{width:300px}}
.anat .ac{border:1px solid var(--border-default);border-radius:14px;padding:20px;background:var(--surface-card)}
.anat .ac .lbl{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin:0 0 14px}
/* ===== Website DLS — extended components ===== */
.annbar{display:flex;align-items:center;justify-content:center;gap:11px;background:#282828;color:#fff;border-radius:11px;padding:12px 16px;font-size:13.5px;flex-wrap:wrap}
.annbar .tp{background:var(--brand-default);color:#fff;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 9px;border-radius:999px;font-family:'Geist Mono',ui-monospace,monospace}
.annbar a{color:#FF9B6B;text-decoration:none;font-weight:600}
.annbar a:hover{text-decoration:underline}
.seg{display:inline-flex;background:var(--surface-subtle);border:1px solid var(--border-default);border-radius:10px;padding:3px}
.seg button{all:unset;cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;border-radius:7px;color:var(--text-secondary);transition:background .15s}
.seg button.on{background:var(--brand-default);color:#fff}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border-default)}
.tabs button{all:unset;cursor:pointer;font-size:13.5px;font-weight:600;padding:11px 14px;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--brand-default);border-color:var(--brand-default)}
.dtable{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;border:1px solid var(--border-default);border-radius:12px;overflow:hidden}
.dtable th{background:var(--surface-subtle);text-align:left;padding:11px 14px;font-weight:600;color:var(--text-secondary);font-size:12px}
.dtable td{padding:11px 14px;border-top:1px solid var(--border-subtle);color:var(--text-primary)}
.toast{display:flex;align-items:center;gap:11px;background:var(--surface-default);border:1px solid var(--border-default);border-radius:12px;padding:12px 14px;box-shadow:0 10px 28px rgba(0,0,0,.10)}
.toast .ck{width:24px;height:24px;border-radius:50%;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:0 0 auto}
.toast .tt{font-size:13.5px;color:var(--text-primary);font-weight:600}
.toast .ts{font-size:12px;color:var(--text-tertiary)}
.avg{display:flex;align-items:center}
.avg .av{width:34px;height:34px;border-radius:50%;border:2px solid var(--surface-default);margin-left:-9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.avg .av:first-child{margin-left:0}
.avg .more{background:var(--surface-subtle)!important;color:var(--text-secondary)!important}
.steps{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.steps .st{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-tertiary)}
.steps .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--border-default);color:var(--text-tertiary)}
.steps .st.done .dot{background:#22c55e;color:#fff}
.steps .st.on .dot{background:var(--brand-default);color:#fff}
.steps .st.on{color:var(--text-primary);font-weight:600}
.steps .bar{width:30px;height:2px;background:var(--border-default);margin:0 8px}
.prog{height:9px;border-radius:999px;background:var(--surface-subtle);overflow:hidden}
.prog .fill{height:100%;background:var(--brand-default);border-radius:999px}
.tagset .tg{display:inline-block;font-size:12px;font-weight:600;padding:5px 11px;border-radius:7px;margin:0 6px 6px 0;background:var(--brand-subtle);color:var(--brand-default)}
.tagset .tg.grey{background:var(--surface-subtle);color:var(--text-secondary)}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-tertiary);flex-wrap:wrap}
.crumb a{color:var(--text-secondary);text-decoration:none}
.crumb a:hover{color:var(--brand-default)}
.crumb .cur{color:var(--brand-default);font-weight:600}
.infob{display:flex;gap:0;background:var(--surface-banner,#FCE9E1);border-radius:12px;overflow:hidden}
.infob .mk{width:6px;background:var(--brand-default);flex:0 0 auto}
.infob .tx{font-size:13.5px;color:var(--text-secondary);line-height:1.5;padding:13px 15px}
.infob .tx b{color:var(--text-primary)}
.empty{text-align:center;padding:26px;border:1px dashed var(--border-default);border-radius:14px}
.empty .blk{width:46px;height:46px;border-radius:12px;background:var(--brand-subtle);margin:0 auto 13px;display:flex;align-items:center;justify-content:center}
.empty .blk::after{content:"";width:18px;height:18px;border-radius:5px;background:var(--brand-default)}
.empty h5{font-family:var(--display);font-weight:700;font-size:16px;margin:0 0 5px;color:var(--text-primary)}
.empty p{font-size:13px;color:var(--text-secondary);margin:0 0 14px}
.modal{border:1px solid var(--border-default);border-radius:16px;background:var(--surface-default);box-shadow:0 24px 60px rgba(0,0,0,.16);overflow:hidden}
.modal .mh{padding:17px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.modal .mh h5{font-family:var(--display);font-weight:700;font-size:17px;margin:0;color:var(--text-primary)}
.modal .mh .x{color:var(--text-tertiary);font-size:18px;cursor:pointer}
.modal .mb{padding:17px 20px;font-size:13.5px;color:var(--text-secondary);line-height:1.5}

*,*::before,*::after{box-sizing:border-box}
:root{
  --ui-bg:#16110F;        /* warm near-black sidebar */
  --ui-bg2:#1E1813;
  --ui-ink:#F2EBE2;
  --ui-mute:#9A8E81;
  --ui-line:#2C241E;
  --ui-orange:#FD5000;
  --canvas:#EFEAE2;
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
html{scroll-behavior:smooth;overflow-x:clip}
body{margin:0;font-family:var(--body);background:var(--canvas);color:#1B1919;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:clip;max-width:100vw}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  position:sticky;top:0;align-self:flex-start;height:100vh;flex:0 0 268px;width:268px;
  background:linear-gradient(176deg,#1C1510 0%,var(--ui-bg) 38%,#120D0B 100%);color:var(--ui-ink);
  display:flex;flex-direction:column;border-right:1px solid var(--ui-line);overflow-y:auto;z-index:5;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent;overscroll-behavior:contain}
.sidebar::-webkit-scrollbar{width:7px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:10px}
.sidebar:hover::-webkit-scrollbar-thumb{background:rgba(255,255,255,.26)}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(253,80,0,.55)}
.brand{padding:26px 24px 18px;border-bottom:1px solid var(--ui-line)}
.brand .logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.02em}
.brand .dot{width:13px;height:13px;border-radius:50%;background:var(--ui-orange);box-shadow:0 0 0 4px rgba(253,80,0,.18)}
.brand .sub{margin-top:8px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ui-mute)}
.nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px}
.nav .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ui-mute);padding:14px 12px 6px}
.nav button{
  all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
  font-size:14px;color:#D8CEC2;transition:background .15s,color .15s;position:relative}
.nav button .sw{width:14px;height:14px;border-radius:4px;flex:0 0 auto;border:1px solid rgba(255,255,255,.18)}
.nav button .meta{margin-left:auto;font-size:10.5px;color:var(--ui-mute);font-family:var(--mono)}
.nav button .nic{display:flex;flex:0 0 auto}
.subnav{display:flex;flex-direction:column;gap:1px;margin:2px 0 10px 30px;padding-left:12px;border-left:1px solid var(--ui-line)}
.subnav a{font-size:12.5px;color:#9a8e81;padding:5px 9px;border-radius:6px;cursor:pointer;text-decoration:none;transition:color .15s,background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subnav a:hover{color:#fff}
.subnav a.cur{color:#fff;background:rgba(253,80,0,.16)}
.nav button:hover{background:var(--ui-bg2);color:#fff}
.nav button.active{background:linear-gradient(90deg,rgba(253,80,0,.16),rgba(253,80,0,.02));color:#fff}
.nav button.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--ui-orange)}
.side-foot{margin-top:auto;padding:16px 24px;border-top:1px solid var(--ui-line);font-size:11px;color:var(--ui-mute);line-height:1.5}
.side-foot b{color:#C9BEB1;font-weight:600}

main{flex:1;min-width:0;overflow-x:clip}
#stage{min-height:100vh;background:var(--c-canvas,#fff);color:var(--text-primary);transition:background .25s}

/* ---------- Generic section scaffolding ---------- */
.wrap{max-width:1120px;margin:0 auto;padding:0 48px}
.sys-hero{padding:64px 48px 40px;background:var(--hero-bg);color:var(--hero-ink);position:relative;overflow:hidden;border-bottom:1px solid var(--border-subtle)}
.sys-hero .inner{max-width:1120px;margin:0 auto;position:relative;z-index:1}
.sys-hero .kicker{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--hero-kick);font-weight:600;margin:0 0 14px;font-family:var(--mono)}
.sys-hero h1{font-family:var(--display);font-weight:700;font-size:clamp(34px,5vw,58px);line-height:1.02;letter-spacing:-.03em;margin:0;text-wrap:balance}
.sys-hero p.lede{font-size:18px;line-height:1.55;max-width:60ch;margin:18px 0 0;color:var(--hero-sub)}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.chip{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 13px;border-radius:999px;font-family:var(--mono);
  background:var(--chip-bg);color:var(--chip-ink);border:1px solid var(--chip-line)}
.chip .swt{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}
.hero-note{margin-top:22px;max-width:60ch;font-size:13px;line-height:1.5;padding:11px 14px;border-radius:10px;background:var(--chip-bg);color:var(--hero-sub);border:1px dashed var(--chip-line)}
/* hero depth: soft brand glow + faint dot-grid texture */
.sys-hero::before{content:"";position:absolute;top:-160px;right:-110px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(253,80,0,.20),rgba(253,80,0,0) 68%);pointer-events:none;z-index:0}
.sys-hero::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(25,25,25,.08) 1px,transparent 1.6px);background-size:21px 21px;-webkit-mask-image:linear-gradient(108deg,#000,transparent 50%);mask-image:linear-gradient(108deg,#000,transparent 50%);pointer-events:none;z-index:0}
/* scroll reveal (reduced-motion safe) */
@media (prefers-reduced-motion:no-preference){
  section.block.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .7s cubic-bezier(.22,1,.36,1)}
  section.block.reveal.in{opacity:1;transform:none}
}
/* card micro-interactions */
.why-card,.human-card,.sw-card,.panel{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.why-card:hover,.human-card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(20,4,3,.09);border-color:var(--brand-default)}
.sw-card:hover,.panel:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(20,4,3,.07)}
/* ===== Hero art motifs (one per system) ===== */
.sys-hero.has-art .inner{padding-right:382px}
.hero-art{position:absolute;right:2px;top:50%;transform:translateY(-50%);width:344px;z-index:1;pointer-events:none}
@media(max-width:1060px){.sys-hero.has-art .inner{padding-right:0}.hero-art{display:none}}
.hero-art .float{animation:hfloat 6.5s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.hero-art .float{animation:none}}
@keyframes hfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
/* mini product window (website) */
.ha-win{background:#fff;border-radius:14px;box-shadow:0 30px 70px rgba(20,4,3,.30);overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.ha-win .bar{display:flex;gap:6px;align-items:center;padding:11px 13px;background:#F6F1EB;border-bottom:1px solid #ECE6DD}
.ha-win .bar i{width:9px;height:9px;border-radius:50%;background:#D9D2C7;display:block}
.ha-win .bd{padding:20px}
.ha-win .h{height:12px;width:58%;border-radius:5px;background:#191919;margin-bottom:10px}
.ha-win .l{height:8px;border-radius:5px;background:#E7E0D6;margin-bottom:8px}
.ha-win .btn{margin-top:6px;display:inline-block;padding:0 16px;border-radius:8px;background:#FD5000;color:#fff;font:600 12px/30px 'Inter',sans-serif;height:30px}
.ha-win .bars{display:flex;gap:5px;align-items:flex-end;margin-top:18px;height:46px}
.ha-win .bars span{flex:1;background:#FFE0D0;border-radius:3px 3px 0 0}
.ha-win .bars span:nth-child(4){background:#FD5000}
/* deck slide fan */
.ha-fan{position:relative;height:236px}
.ha-fan .sl{position:absolute;left:50%;width:248px;height:139px;border-radius:12px;box-shadow:0 20px 46px rgba(20,4,3,.30);border:1px solid rgba(0,0,0,.06);padding:15px 16px;overflow:hidden}
.ha-fan .s1{margin-left:-104px;top:2px;transform:rotate(8deg);background:linear-gradient(135deg,#FF8A4C 0%,#FD5000 70%,#DB3602 100%);color:#fff;border-color:rgba(255,255,255,.35)}
.ha-fan .s2{margin-left:-128px;top:46px;transform:rotate(-4deg);background:linear-gradient(135deg,#FF8A4C 0%,#FD5000 70%,#DB3602 100%);color:#fff;border-color:rgba(255,255,255,.35)}
.ha-fan .s3{margin-left:-150px;top:92px;transform:rotate(-13deg);background:#fff;color:#191919}
.ha-fan .e{font:600 8px/1 'Geist Mono',monospace;letter-spacing:.14em;text-transform:uppercase;opacity:.65}
.ha-fan .t{font:700 16px/1.08 'Plus Jakarta Sans',sans-serif;margin-top:9px;letter-spacing:-.01em}
.ha-fan .s3 .e{opacity:.85}
/* one-pager mini doc */
.ha-doc{background:#fff;border-radius:12px;box-shadow:0 28px 64px rgba(20,4,3,.26);padding:24px 22px 20px;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.05)}
.ha-doc .rule{position:absolute;left:0;top:0;height:6px;width:100%;background:linear-gradient(90deg,#FF8A4C,#FD5000,#DB3602)}
.ha-doc .lk{font:700 10px/1 'Geist Mono',monospace;letter-spacing:.1em;color:#FD5000;margin:6px 0 16px}
.ha-doc .l{height:8px;border-radius:5px;background:#E7E0D6;margin-bottom:8px}
.ha-doc .m{margin-top:18px;padding-top:16px;border-top:1px solid #EFEAE2;display:flex;align-items:baseline;gap:9px}
.ha-doc .m b{font:700 34px/1 'Plus Jakarta Sans',sans-serif;color:#191919;letter-spacing:-.02em}
.ha-doc .m span{font:500 12px/1 'Inter',sans-serif;color:#7A7268}
/* use: connect card */
.ha-conn{background:#fff;border-radius:14px;box-shadow:0 28px 64px rgba(20,4,3,.22);padding:22px;border:1px solid rgba(0,0,0,.05)}
.ha-conn .np{display:flex;align-items:center;gap:10px;border:1px solid #E7E0D6;border-radius:11px;padding:12px 14px;font:600 14px/1 'Plus Jakarta Sans',sans-serif;color:#191919;background:#FBF8F4}
.ha-conn .np .ci{width:30px;height:30px;border-radius:8px;background:#FFE7DC;color:#FD5000;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ha-conn .wire{height:26px;margin:0 0 0 28px;border-left:2px dashed #E0D8CD}
.ha-conn .repo{margin-top:16px;font:500 11px/1 'Geist Mono',monospace;color:#7A7268;background:#F6F1EB;border-radius:7px;padding:9px 11px;text-align:center;word-break:break-all}
/* humans: mini workers on a ground line */
.ha-crew{position:relative;height:188px;display:flex;align-items:flex-end;justify-content:center;gap:14px;padding-bottom:18px}
.ha-crew::after{content:"";position:absolute;left:8%;right:8%;bottom:14px;height:1px;background:linear-gradient(90deg,transparent,#D8CFC2,transparent)}
.ha-crew img{height:120px;width:auto;position:relative}
.ha-crew img:nth-child(2){height:150px}
/* single walking mini human on the hero floor */
.ha-walker{position:absolute;right:160px;bottom:0;height:122px;width:auto;z-index:1;pointer-events:none}
@media(max-width:1060px){.ha-walker{right:40px}}
@media(max-width:680px){.ha-walker{display:none}}
/* ===== Overview / cover landing ===== */
.ov-principles{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 30px}
.ov-feat{display:flex;align-items:center;gap:24px;border:1px solid var(--border-default);border-radius:18px;background:linear-gradient(118deg,#fff,#FFF3EC 70%,#FFE7DC);padding:26px 28px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;margin-bottom:18px;width:100%;text-align:left}
.ov-feat:hover{transform:translateY(-3px);box-shadow:0 18px 44px rgba(20,4,3,.10);border-color:var(--brand-default)}
.ov-feat .ic{width:56px;height:56px;border-radius:14px;background:var(--brand-default);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ov-feat .gx{flex:1;min-width:0}
.ov-feat .tag{font:600 10.5px/1 'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--brand-default);margin-bottom:7px}
.ov-feat h3{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.02em;margin:0 0 5px;color:var(--text-primary)}
.ov-feat p{margin:0;font-size:13.5px;line-height:1.5;color:var(--text-secondary)}
.ov-feat .go{flex:0 0 auto;font:600 14px/1 'Inter',sans-serif;color:var(--brand-default);display:flex;align-items:center;gap:7px}
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
@media(max-width:720px){.ov-grid{grid-template-columns:1fr}.ov-feat{flex-direction:column;align-items:flex-start;gap:14px}}
.ov-card{text-align:left;border:1px solid var(--border-default);border-radius:18px;background:var(--surface-card);padding:24px;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;display:flex;flex-direction:column;gap:13px;min-height:188px}
.ov-card::before{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(253,80,0,.10),transparent 70%);opacity:0;transition:opacity .2s}
.ov-card:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(20,4,3,.10);border-color:var(--brand-default)}
.ov-card:hover::before{opacity:1}
.ov-card .top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.ov-card .ic{width:46px;height:46px;border-radius:12px;background:var(--brand-subtle);color:var(--brand-default);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ov-card .num{margin-left:auto;font:600 11px/1 'Geist Mono',monospace;color:var(--text-tertiary);letter-spacing:.12em}
.ov-card .tag{font:600 10.5px/1 'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary);position:relative;z-index:1}
.ov-card h3{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.02em;margin:0;color:var(--text-primary);position:relative;z-index:1}
.ov-card p{margin:0;font-size:13px;line-height:1.55;color:var(--text-secondary);position:relative;z-index:1}
.ov-card .go{margin-top:auto;font:600 13px/1 'Inter',sans-serif;color:var(--brand-default);display:flex;align-items:center;gap:6px;position:relative;z-index:1}
/* ===== Brand assets: logos + social templates ===== */
.la-fam{margin-top:30px}
.la-fam h3.grp{font-family:var(--display);font-weight:700;font-size:17px;margin:0 0 3px;color:var(--text-primary);letter-spacing:-.01em}
.la-fam .grp-note{font-size:12.5px;color:var(--text-secondary);margin:0 0 16px;line-height:1.5}
.la-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:16px}
.la-card{border:1px solid var(--border-default);border-radius:14px;overflow:hidden;background:var(--surface-card);display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.la-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(20,4,3,.08);border-color:var(--brand-default)}
.la-prev{height:124px;display:flex;align-items:center;justify-content:center;padding:18px;background:#F2ECE3;border-bottom:1px solid var(--border-subtle)}
.la-card.dark .la-prev{background:#191919}
.la-prev img{max-height:80px;max-width:84%;width:auto;object-fit:contain}
.la-meta{padding:13px 14px 14px;display:flex;flex-direction:column;gap:11px}
.la-name{font:600 13px/1 'Inter',sans-serif;color:var(--text-primary)}
.la-btns{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.la-copy,.la-dl{font:600 11.5px/1 'Inter',sans-serif;border-radius:8px;padding:8px 11px;cursor:pointer;text-decoration:none;border:1px solid var(--border-default);transition:background .15s,color .15s,border-color .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.la-copy svg,.la-dl svg{width:13px;height:13px}
.la-copy{background:var(--brand-default);color:#fff;border-color:var(--brand-default)}
.la-copy:hover{background:var(--brand-hover);border-color:var(--brand-hover)}
.la-copy.done{background:#1E854B;border-color:#1E854B}
.la-dl{background:#fff;color:var(--text-primary)}
.la-dl:hover{border-color:var(--brand-default);color:var(--brand-default)}
.la-soc{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.s-card{border:1px solid var(--border-default);border-radius:16px;overflow:hidden;background:var(--surface-card);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.s-card:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(20,4,3,.09);border-color:var(--brand-default)}
.s-prev{background:#0c0c0c;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle)}
.s-prev img{width:100%;height:auto;display:block}
.s-meta{padding:15px 17px;display:flex;align-items:center;gap:12px}
.s-meta .nm{font:600 14px/1.3 'Inter',sans-serif;color:var(--text-primary)}
.s-meta .dim{font:500 11px/1 'Geist Mono',monospace;color:var(--text-tertiary);margin-top:4px}
.s-btns{margin-left:auto;display:flex;gap:8px;flex:0 0 auto}
.cd-open{display:inline-flex;align-items:center;gap:11px;background:var(--brand-default);color:#fff;font:700 16px/1 'Plus Jakarta Sans',system-ui,sans-serif;padding:17px 28px;border-radius:13px;text-decoration:none;box-shadow:0 16px 38px rgba(253,80,0,.28);transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
.cd-open:hover{background:var(--brand-hover);transform:translateY(-2px);box-shadow:0 20px 48px rgba(253,80,0,.34)}
.cd-open svg{width:18px;height:18px}
.cd-open .ar{font-size:16px;opacity:.9}
.cd-sub{margin-top:14px;font-size:12.5px;color:var(--text-tertiary)}
.cd-sub code{font-family:'Geist Mono',monospace;color:var(--text-secondary)}
.cd-fallback{margin-top:28px;padding:20px 22px;border:1px dashed var(--chip-line,#E7E0D6);border-radius:13px;background:rgba(246,241,235,.5)}
.cd-fallback .fb-h{font:700 13px/1.3 'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text-primary);margin-bottom:8px}
.cd-fallback p{font-size:13px;line-height:1.6;color:var(--text-secondary);margin:0}
.cd-fallback .repo-row{display:flex;align-items:stretch;gap:8px;margin-top:14px;flex-wrap:wrap}
.cd-fallback .repo-url{flex:1 1 240px;display:flex;align-items:center;gap:9px;min-width:0;font:600 13.5px/1 'Geist Mono',monospace;color:var(--text-primary);background:#fff;border:1px solid var(--chip-line,#E7E0D6);border-radius:9px;padding:0 14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cd-fallback .repo-url .gi{color:var(--brand-default);flex:0 0 auto;display:flex}
.cd-fallback .url-copy{display:inline-flex;align-items:center;gap:8px;font:700 13.5px/1 'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;background:var(--brand-default);border:none;border-radius:9px;padding:11px 16px;cursor:pointer;transition:background .15s ease,transform .15s ease;flex:0 0 auto}
.cd-fallback .url-copy:hover{background:var(--brand-hover);transform:translateY(-1px)}
.cd-fallback .dl-zip{display:inline-flex;align-items:center;gap:10px;margin-top:12px;font:700 14px/1 'Plus Jakarta Sans',system-ui,sans-serif;color:#fff;background:var(--brand-default);border:none;border-radius:10px;padding:13px 20px;text-decoration:none;box-shadow:0 10px 26px rgba(253,80,0,.24);transition:background .15s ease,transform .15s ease}
.cd-fallback .dl-zip:hover{background:var(--brand-hover);transform:translateY(-1px)}
.esig{display:grid;grid-template-columns:minmax(0,360px) minmax(0,1fr);gap:30px;align-items:start;margin-top:8px}
@media(max-width:820px){.esig{grid-template-columns:1fr}}
.esig .form{display:flex;flex-direction:column;gap:14px}
.esig .form .fld label{display:block;font:600 12px/1.2 'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text-secondary);margin-bottom:6px}
.esig .ctl-row{display:flex;flex-direction:column;gap:9px;margin-top:2px}
.esig .ctl{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-secondary);cursor:pointer}
.esig .ctl input{accent-color:var(--brand-default);width:16px;height:16px}
.esig .preview-col{position:sticky;top:22px}
.esig .pv-label{font:600 11px/1 'Geist Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px}
.esig .pv-card{background:#fff;border:1px solid var(--border-default);border-radius:14px;padding:30px 28px;box-shadow:0 14px 34px rgba(25,25,25,.06);overflow-x:auto}
.esig .pv-actions{display:flex;gap:11px;margin-top:16px;flex-wrap:wrap}
.esig .btn-copy{display:inline-flex;align-items:center;gap:9px;background:var(--brand-default);color:#fff;font:700 14px/1 'Plus Jakarta Sans',system-ui,sans-serif;border:none;padding:13px 20px;border-radius:11px;cursor:pointer;box-shadow:0 12px 28px rgba(253,80,0,.26);transition:transform .15s ease,background .15s ease}
.esig .btn-copy:hover{background:var(--brand-hover);transform:translateY(-1px)}
.esig .btn-ghost{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--text-secondary);font:600 13.5px/1 'Plus Jakarta Sans',system-ui,sans-serif;border:1px solid var(--border-default);padding:13px 18px;border-radius:11px;cursor:pointer;transition:border-color .15s ease}
.esig .btn-ghost:hover{border-color:var(--brand-default);color:var(--text-primary)}
.esig .pv-hint{margin-top:14px;font-size:12.5px;line-height:1.6;color:var(--text-tertiary)}
.esig .pv-hint b{color:var(--text-secondary)}
.esig .es-banners{display:flex;flex-direction:column;gap:9px}
.esig .bopt{display:block;cursor:pointer;border:2px solid var(--border-default);border-radius:10px;overflow:hidden;line-height:0;transition:border-color .15s ease}
.esig .bopt:hover{border-color:#d9b8a8}
.esig .bopt input{position:absolute;opacity:0;pointer-events:none}
.esig .bopt img{width:100%;height:auto;display:block}
.esig .bopt .bnone{display:flex;align-items:center;justify-content:center;height:42px;font:600 13px/1 'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text-secondary)}
.esig .bopt:has(input:checked){border-color:var(--brand-default);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand-default) 18%,transparent)}
.adscroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}

section.block{padding:54px 0}
section.block+section.block{border-top:1px solid var(--border-subtle)}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand-default);font-weight:500;font-family:'Geist Mono',ui-monospace,monospace;margin:0 0 8px}
h2.sec{font-family:var(--display);font-weight:700;font-size:27px;letter-spacing:-.02em;margin:0 0 4px;color:var(--text-primary)}
.sec-note{font-size:14px;color:var(--text-secondary);margin:0 0 26px;max-width:64ch;line-height:1.55}
h3.grp{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-tertiary);font-weight:600;margin:30px 0 12px;font-family:var(--mono)}

/* ---------- Swatches ---------- */
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:14px}
.swatches.sem{grid-template-columns:repeat(auto-fill,minmax(184px,1fr))}
.sw-card{border-radius:13px;overflow:hidden;background:var(--surface-card);border:1px solid var(--border-default);cursor:pointer;position:relative}
.sw-card.copied{box-shadow:0 0 0 2px var(--brand-default)}
.sw-card.copied::after{content:"Copied ✓";position:absolute;top:7px;right:7px;background:#191919;color:#fff;font:600 9px/1 'Inter',sans-serif;letter-spacing:.02em;padding:4px 7px;border-radius:6px;z-index:2}
.sw-chip{height:74px;border-bottom:1px solid var(--border-subtle)}
.sw-card.sem .sw-chip{height:64px}
.sw-body{padding:10px 12px 12px}
.sw-name{font-size:12.5px;font-weight:600;color:var(--text-primary);font-family:var(--body);word-break:break-word}
.sw-var{font-size:11px;color:var(--text-brand);font-family:var(--mono);margin-top:3px;word-break:break-word}
.sw-hex{font-size:11px;color:var(--text-tertiary);font-family:var(--mono);margin-top:3px;text-transform:uppercase}

/* ---------- Typography specimen ---------- */
.type-row{display:flex;align-items:baseline;gap:20px;padding:16px 0;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap}
.type-row .tag{flex:0 0 120px;font-family:var(--mono);font-size:11px;color:var(--text-tertiary)}
.type-row .demo{color:var(--text-primary);line-height:1.1}
.type-sample{font-family:var(--display);font-weight:700;letter-spacing:-.02em}
.body-sample{font-family:var(--body)}

/* ---------- Foundations ---------- */
.found-grid{display:grid;grid-template-columns:1fr 1fr;gap:34px}
@media(max-width:760px){.found-grid{grid-template-columns:1fr}}
.space-bar{display:flex;align-items:center;gap:14px;margin:9px 0}
.space-bar .b{height:16px;background:var(--brand-default);border-radius:3px;opacity:.85}
.space-bar .t{font-family:var(--mono);font-size:11.5px;color:var(--text-secondary);min-width:70px}
.radii{display:flex;gap:16px;flex-wrap:wrap}
.radii .r{width:78px;height:78px;background:var(--brand-subtle);border:1.5px solid var(--brand-default);display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;font-family:var(--mono);font-size:11px;color:var(--text-brand)}
.shadows{display:flex;gap:20px;flex-wrap:wrap}
.shadows .sh{width:120px;height:84px;border-radius:12px;background:var(--surface-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-family:var(--mono);font-size:11px;color:var(--text-secondary);border:1px solid var(--border-subtle)}
.grad-demo{height:120px;border-radius:14px;background:linear-gradient(110deg,var(--grad-start),var(--grad-mid),var(--grad-end));display:flex;align-items:flex-end;padding:14px;font-family:var(--mono);font-size:11.5px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.35)}

/* ---------- Components ---------- */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;align-items:start}
.panel{background:var(--surface-card);border:1px solid var(--border-default);border-radius:16px;padding:22px}
.panel h4{margin:0 0 16px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);font-family:var(--mono);font-weight:600}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row+.row{margin-top:12px}
.btn{font-family:var(--body);font-weight:600;font-size:14px;padding:10px 18px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:filter .15s,transform .05s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--brand-default);color:var(--brand-on-brand)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-secondary{background:var(--surface-default);color:var(--text-primary);border-color:var(--border-default)}
.btn-ghost{background:transparent;color:var(--text-brand);border-color:transparent}
.btn-ghost:hover{background:var(--brand-subtle)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;font-family:var(--body)}
.pill-brand{background:var(--brand-subtle);color:var(--text-brand)}
.pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.alert{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:11px;font-size:13.5px;line-height:1.45}
.alert+.alert{margin-top:10px}
.alert .ic{font-weight:700;font-family:var(--display)}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;font-family:var(--body)}
.fld input{width:100%;font-family:var(--body);font-size:14px;padding:11px 13px;border-radius:10px;border:1px solid var(--border-default);background:var(--surface-default);color:var(--text-primary)}
.fld input:focus{outline:none;border-color:var(--brand-default);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand-default) 22%,transparent)}
.fld input::placeholder{color:var(--text-tertiary)}
.mini-card{background:var(--surface-default);border:1px solid var(--border-default);border-radius:14px;padding:18px;overflow:hidden}
.mini-card .mc-k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);font-family:var(--mono)}
.mini-card .mc-v{font-family:var(--display);font-weight:700;font-size:30px;color:var(--text-primary);letter-spacing:-.02em;margin-top:6px}
.mini-card .mc-d{font-size:12.5px;color:var(--text-secondary);margin-top:4px}
.bars{display:flex;align-items:flex-end;gap:9px;height:84px;margin-top:16px}
.bars .bar{flex:1;border-radius:5px 5px 0 0;min-width:8px}

/* sample slide */
.slide{aspect-ratio:16/9;border-radius:16px;overflow:hidden;border:1px solid var(--border-default);background:var(--surface-default);display:flex;flex-direction:column;position:relative}
.slide .topbar{height:7px;background:linear-gradient(90deg,var(--grad-start),var(--grad-mid),var(--grad-end))}
.slide .sbody{padding:30px 34px;display:flex;flex-direction:column;height:100%}
.slide .seyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-brand);font-weight:600}
.slide h3{font-family:var(--display);font-weight:700;font-size:clamp(22px,3.2vw,38px);line-height:1.04;letter-spacing:-.025em;margin:12px 0 0;color:var(--text-primary);max-width:18ch;text-wrap:balance}
.slide .spt{margin-top:auto;display:flex;align-items:center;gap:14px}
.slide .logo-s{font-family:var(--display);font-weight:700;font-size:15px;color:var(--text-primary);display:flex;align-items:center;gap:7px}
.slide .logo-s .d{width:10px;height:10px;border-radius:50%;background:var(--brand-default)}
.slide .metric{margin-left:auto;font-family:var(--display);font-weight:700;font-size:26px;color:var(--text-brand);letter-spacing:-.02em}

/* nav/hero web demo */
.web-nav{display:flex;align-items:center;gap:22px;padding:14px 20px;background:var(--surface-default);border:1px solid var(--border-default);border-radius:14px}
.web-nav .wlogo{font-family:var(--display);font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px;color:var(--text-primary)}
.web-nav .wlogo .d{width:11px;height:11px;border-radius:50%;background:var(--brand-default)}
.web-nav .links{display:flex;gap:18px;font-size:13.5px;color:var(--text-secondary)}
.web-nav .links span{cursor:pointer}
.web-nav .links span:hover{color:var(--text-brand)}
.web-nav .spacer{margin-left:auto}
.web-hero{margin-top:18px;border-radius:18px;padding:46px 38px;background:linear-gradient(150deg,var(--surface-card),var(--brand-subtle));border:1px solid var(--border-default);overflow:hidden}
.web-hero h3{font-family:var(--display);font-weight:700;font-size:clamp(26px,4vw,44px);line-height:1.03;letter-spacing:-.03em;margin:0;max-width:16ch;color:var(--text-primary);text-wrap:balance}
.web-hero p{font-size:15.5px;color:var(--text-secondary);max-width:48ch;margin:16px 0 24px;line-height:1.55}

/* ===== Website DLS — atoms & molecules ===== */
.wbtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;font-size:14px;font-weight:600;border-radius:8px;border:2px solid transparent;cursor:pointer;line-height:1;transition:all .2s ease;text-decoration:none;font-family:var(--body)}
.wbtn:active{transform:translateY(1px)}
.wbtn-primary{background:var(--brand-default);color:#fff}
.wbtn-primary:hover{background:var(--brand-hover)}
.wbtn-cream{background:var(--surface-cream);color:var(--brand-deep);border-color:var(--surface-cream)}
.wbtn-cream:hover{background:#fff;color:var(--brand-default)}
.wbtn-outline{background:transparent;border:1px solid var(--brand-default);color:var(--brand-default)}
.wbtn-outline:hover{background:var(--surface-hover)}
.wbtn-ghost{background:transparent;color:var(--brand-default)}
.wbtn-ghost:hover{background:var(--surface-hover)}
.wbtn-onorange{background:#fff;color:var(--brand-default);border-color:#fff}
.wbtn-full{width:100%;padding:14px 22px;font-size:16px;border-radius:10px}
.wbtn-sm{padding:7px 15px;font-size:13px}
.wbtn-lg{padding:14px 26px;font-size:16px;border-radius:10px}
.wbtn[disabled]{opacity:.45;cursor:not-allowed}
.wlink{color:var(--brand-default);text-decoration:none;font-weight:600;border-bottom:1.5px solid transparent;transition:border-color .15s}
.wlink:hover{border-color:var(--brand-default)}
.swatch-tall .sw-chip{height:54px}
/* form controls */
.ctl{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-primary);font-family:var(--body)}
.ctl input{accent-color:var(--brand-default);width:17px;height:17px}
.switch{position:relative;width:42px;height:24px;border-radius:999px;background:var(--border-strong);transition:background .2s;flex:0 0 auto;cursor:pointer}
.switch.on{background:var(--brand-default)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.switch.on::after{transform:translateX(18px)}
.dot-ind{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
.dot-ind .d{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e}
.fld textarea{width:100%;font-family:var(--body);font-size:14px;padding:11px 13px;border-radius:10px;border:1px solid var(--border-default);background:var(--surface-default);color:var(--text-primary);resize:vertical;min-height:74px}
.fld input.err,.fld textarea.err{border-color:#dc2626;box-shadow:0 0 0 3px #dc26261a}
.fld .errmsg{color:#b5271c;font-size:12px;margin-top:6px}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--brand-default);box-shadow:0 0 0 3px #fd50001a}
/* grid + breakpoints */
.gridcols{display:grid;grid-template-columns:repeat(12,1fr);gap:8px;margin-top:6px}
.gridcols .col{height:48px;background:var(--brand-subtle);border:1px solid var(--brand-default);border-radius:6px}
.bps{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.bp{font-family:var(--mono);font-size:12px;padding:8px 13px;border-radius:8px;background:var(--surface-warm);border:1px solid var(--border-default);color:var(--text-secondary)}
.bp b{color:var(--text-primary)}
/* molecules */
.feat{background:var(--surface-default);border:1px solid var(--card-border,#f0f0f0);border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.feat .ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--brand-subtle);margin-bottom:14px}
.feat .ic::after{content:"";width:18px;height:18px;border-radius:5px;background:var(--brand-default)}
.feat h5{font-family:var(--display);font-weight:700;font-size:18px;margin:0 0 7px;color:var(--text-primary);letter-spacing:-.01em}
.feat p{margin:0;font-size:14px;color:var(--text-secondary);line-height:1.55}
.price{border:1px solid var(--border-default);border-radius:18px;padding:26px;background:var(--surface-default)}
.price.featured{border:2px solid var(--brand-default);box-shadow:0 14px 40px rgba(253,80,0,.12)}
.price .tier{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-default)}
.price .amt{font-family:var(--display);font-weight:700;font-size:40px;color:var(--text-primary);letter-spacing:-.02em;margin:8px 0 2px}
.price .amt span{font-size:15px;color:var(--text-tertiary);font-weight:500}
.price ul{list-style:none;padding:0;margin:16px 0;display:flex;flex-direction:column;gap:9px}
.price li{font-size:13.5px;color:var(--text-secondary);display:flex;gap:9px;align-items:flex-start}
.price li::before{content:"✓";color:#22c55e;font-weight:700}
.quote{background:var(--surface-warm);border:1px solid var(--border-default);border-radius:18px;padding:26px}
.quote p{font-family:var(--display);font-weight:500;font-size:18px;line-height:1.5;color:var(--text-primary);margin:0 0 18px;letter-spacing:-.01em}
.quote .who{display:flex;align-items:center;gap:12px}
.quote .av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--brand-default),var(--brand-hover));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:var(--display)}
.quote .nm{font-size:14px;font-weight:600;color:var(--text-primary)}
.quote .rl{font-size:12.5px;color:var(--text-tertiary)}
.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.statrow .st{padding:18px;border-radius:14px;background:var(--surface-cream);border:1px solid var(--surface-warm-border,#ecdaa3)}
.statrow .st .n{font-family:var(--display);font-weight:700;font-size:34px;color:var(--brand-default);letter-spacing:-.02em}
.statrow .st .l{font-size:13px;color:var(--text-secondary);margin-top:3px}
.ctaband{border-radius:20px;padding:42px 38px;background:linear-gradient(120deg,var(--brand-default),var(--brand-hover));color:#fff;display:flex;align-items:center;gap:26px;flex-wrap:wrap;overflow:hidden;position:relative}
.refgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:760px){.refgrid{grid-template-columns:1fr}}
.refcard{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--border-default);border-radius:14px;padding:18px 20px;background:var(--surface-card);text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s,transform .15s}
.refcard:hover{border-color:var(--brand-default);box-shadow:0 10px 30px rgba(253,80,0,.12);transform:translateY(-2px)}
.refcard .ic{width:40px;height:40px;border-radius:10px;background:var(--brand-subtle);color:var(--brand-default);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.refcard .rc{flex:1;min-width:0}
.refcard h4{font-family:var(--display);font-weight:700;font-size:15.5px;margin:0 0 3px;color:var(--text-primary);display:flex;align-items:center;justify-content:space-between;gap:8px}
.refcard h4 .ar{color:var(--brand-default);font-size:15px}
.refcard .url{font-family:'Geist Mono',monospace;font-size:12px;color:var(--brand-default);word-break:break-all;display:block;margin-bottom:5px}
.refcard p{margin:0;font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.ctaband h4{font-family:var(--display);font-weight:700;font-size:26px;margin:0;letter-spacing:-.02em;max-width:22ch;text-transform:none;color:#fff}
.ctaband p{margin:6px 0 0;opacity:.92;font-size:14.5px}
.ctaband .sp{margin-left:auto;display:flex;gap:12px;flex-wrap:wrap}
.foot{background:var(--text-primary);color:#cfcac6;border-radius:18px 18px 0 0;padding:40px 36px 26px;overflow:hidden}
.foot .cols{display:grid;grid-template-columns:1.6fr repeat(3,1fr);gap:28px}
.foot h6{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#fff;margin:0 0 14px;font-family:var(--mono)}
.foot ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px}
.foot a{color:#b9b3ad;font-size:13.5px;text-decoration:none}
.foot a:hover{color:var(--brand-default)}
.foot .tag{font-size:13px;color:#9a948e;margin:14px 0 0;max-width:34ch;line-height:1.55}
.foot .bar{margin-top:28px;padding-top:18px;border-top:1px solid #2c2a28;display:flex;justify-content:space-between;font-size:12.5px;color:#8a847e;flex-wrap:wrap;gap:10px}
.logos{display:flex;gap:30px;flex-wrap:wrap;align-items:center;opacity:.62}
.logos .lg{font-family:var(--display);font-weight:700;font-size:20px;color:var(--text-tertiary);letter-spacing:-.01em}
.acc{border:1px solid var(--border-default);border-radius:12px;overflow:hidden}
.acc .it{padding:16px 18px;border-bottom:1px solid var(--border-subtle);background:var(--surface-default)}
.acc .it:last-child{border-bottom:none}
.acc .q{display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14.5px;color:var(--text-primary);cursor:pointer}
.acc .q .pm{color:var(--brand-default);font-size:20px}
.acc .a{font-size:13.5px;color:var(--text-secondary);margin-top:9px;line-height:1.55}
.type-scale .ts{display:flex;align-items:baseline;gap:18px;padding:11px 0;border-bottom:1px solid var(--border-subtle);flex-wrap:wrap}
.type-scale .ts .mt{font-family:var(--mono);font-size:11px;color:var(--text-tertiary);min-width:128px}
@media(max-width:760px){.foot .cols{grid-template-columns:1fr 1fr}.statrow{grid-template-columns:1fr}.ctaband{flex-direction:column;align-items:flex-start}.ctaband .sp{margin-left:0}}

/* ===== Website DLS v2 — real zuper.co system ===== */
.ebm{font-family:'Geist Mono',ui-monospace,monospace;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--brand-default);margin:0 0 12px}
.ebm.on-dark{color:#FF9B6B}
.wbtn-dark{background:#1B1B1B;color:#fff;border-color:#1B1B1B}
.wbtn-dark:hover{background:#000}
.wbtn-ow{background:transparent;border:1.5px solid rgba(255,255,255,.7);color:#fff}
.wbtn-ow:hover{background:rgba(255,255,255,.14)}
.hl{background:#FCE0D3;color:#B5271C;padding:0 .26em;border-radius:6px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.hlo{color:var(--brand-default)}
/* section grounds */
.ground{border-radius:18px;padding:34px;overflow:hidden}
.ground h4{font-family:var(--display);font-weight:700;font-size:clamp(22px,3vw,30px);letter-spacing:-.025em;margin:0 0 10px;text-transform:none;text-wrap:balance;line-height:1.05}
.ground p.g{font-size:14.5px;line-height:1.55;margin:0 0 20px;max-width:48ch}
.ground.white{background:#fff;border:1px solid var(--border-default);color:#191919}
.ground.white p.g{color:#4B5563}
.ground.dark{background:#282828;color:#fff}
.ground.dark p.g{color:rgba(255,255,255,.72)}
.ground.orange{color:#fff}
.ground.orange p.g{color:rgba(255,255,255,.88)}
.statstrip{display:grid;grid-template-columns:repeat(3,1fr);background:#282828;border-radius:14px;overflow:hidden}
.statstrip .s{padding:22px;text-align:center;border-right:1px solid rgba(255,255,255,.12)}
.statstrip .s:last-child{border-right:none}
.statstrip .n{font-family:var(--display);font-weight:700;font-size:30px;color:#fff;letter-spacing:-.02em}
.statstrip .l{font-size:12.5px;color:rgba(255,255,255,.68);margin-top:4px}
/* megamenu */
.mega{background:#fff;border:1px solid var(--border-default);border-radius:16px;padding:18px;box-shadow:0 24px 60px rgba(0,0,0,.12)}
.mega-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.megacard{background:#F8F0EB;border-radius:14px;padding:18px;min-height:118px;display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s}
.megacard:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.08)}
.megacard .t{font-family:var(--display);font-weight:700;font-size:17px;color:#1B1919;display:flex;align-items:center;gap:8px}
.megacard .t .ar{color:var(--brand-default);font-weight:700}
.megacard .sub{font-size:12.5px;color:#606063;margin-top:auto;padding-top:10px}
.mega-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-subtle)}
.mega-foot .mt{font-size:13px;color:#606063}
.roof-banner{background:#FCE9E1;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.roof-banner .t{font-family:var(--display);font-weight:700;font-size:18px;color:var(--brand-default);display:flex;align-items:center;gap:8px}
.roof-banner .s{font-size:13px;color:#4B5563;margin-top:4px}
.icontile-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px 26px}
.icontile{display:flex;align-items:center;gap:12px;font-size:14.5px;color:#1B1919}
.icontile .sq{width:38px;height:38px;border-radius:9px;background:#EDEDED;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.icontile .sq::after{content:"";width:15px;height:15px;border-radius:4px;background:#B0B0B0}
/* orange footer */
.ofoot{background:var(--brand-default);color:#fff;border-radius:18px;padding:40px 36px 24px;overflow:hidden}
.ofoot .cols{display:grid;grid-template-columns:1.5fr repeat(4,1fr);gap:22px}
.ofoot h6{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.9);margin:0 0 13px}
.ofoot ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.ofoot a{color:rgba(255,255,255,.92);font-size:13.5px;text-decoration:none}
.ofoot a:hover{text-decoration:underline}
.ofoot .tag{font-size:13px;color:rgba(255,255,255,.9);margin:12px 0 0;max-width:32ch;line-height:1.55}
.ofoot .badges{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.ofoot .badge{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#fff;font-family:var(--body)}
.ofoot .bar{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.28);display:flex;justify-content:space-between;font-size:12.5px;color:rgba(255,255,255,.9);flex-wrap:wrap;gap:10px}
@media(max-width:760px){.ofoot .cols{grid-template-columns:1fr 1fr}.mega-grid,.icontile-grid{grid-template-columns:1fr}.statstrip{grid-template-columns:1fr}}
.full{grid-column:1/-1}
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:680px){.cols-2{grid-template-columns:1fr};.wrap,.sys-hero{padding-left:24px;padding-right:24px}}

/* one-pager */
.op{padding:0}
.op-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:22px;margin-top:26px}
@media(max-width:760px){.op-grid{grid-template-columns:1fr}}
.op-card{border:1px solid var(--border-default);border-radius:16px;padding:22px;background:var(--surface-card)}
.op-big{background:var(--brand-default);color:var(--brand-on-brand);border:none}
.op-big .huge{font-family:var(--display);font-weight:700;font-size:46px;letter-spacing:-.03em;line-height:1}
.op-palette{display:flex;border-radius:12px;overflow:hidden;border:1px solid var(--border-default);margin-top:6px}
.op-palette .s{flex:1;height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--mono);font-size:9.5px}
.tov{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.tov .t{font-size:12.5px;padding:6px 12px;border-radius:8px;background:var(--brand-subtle);color:var(--text-brand);font-weight:600}

/* responsive sidebar */
.menu-btn{display:none}
@media(max-width:860px){
  .app{flex-direction:column}
  .sidebar{position:relative;height:auto;width:100%;flex-basis:auto;flex-direction:column}
  .nav{display:none}.nav.open{display:flex}
  .menu-btn{display:block;all:unset;cursor:pointer;position:absolute;right:20px;top:26px;color:var(--ui-ink);font-size:22px}
}
:focus-visible{outline:2px solid var(--ui-orange);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

.icst-btn{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.03em;border:1px solid #E7E0D6;background:#fff;color:#191919;border-radius:9px;padding:10px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}

.icst-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px;max-height:486px;overflow:auto;padding:6px;border:1px solid #F0EAE1;border-radius:12px;background:#fff}

.icst-cell.on{border-color:#FD5000;background:#FFF6F1}
</style>

function swatch(name,hex,varName,sem){
  return `<div class="sw-card${sem?' sem':''}">
    <div class="sw-chip" style="background:${hex}"></div>
    <div class="sw-body">
      <div class="sw-name">${name}</div>
      ${varName?`<div class="sw-var">--${varName}</div>`:''}
      <div class="sw-hex">${hex}</div>
    </div></div>`;
}
const SEM_GROUPS=[
  ["Surface",["surface-default","surface-subtle","surface-card","surface-pill","surface-inverse"]],
  ["Text",["text-primary","text-secondary","text-tertiary","text-disabled","text-brand","text-inverse"]],
  ["Border",["border-subtle","border-default","border-strong","border-brand"]],
  ["Brand",["brand-default","brand-secondary","brand-subtle","brand-on-brand"]],
  ["Status",["status-error-bg","status-error-fg","status-success-bg","status-success-fg","status-warning-bg","status-warning-fg"]]
];

function buildSystem(s){
  const V=s.vars;
  const face=FACE[s.id]||{d:"'Space Grotesk',system-ui,sans-serif",b:"'Inter',system-ui,sans-serif",logo:"dark"};
  const fl=FONTLABEL[s.id]||s.fonts;
  const varStyle=Object.entries(V).map(([k,v])=>`--${k}:${v}`).join(";")
    +`;--display:${face.d};--body:${face.b};--c-canvas:${s.canvas}`
    +`;--hero-bg:${s.hero.bg};--hero-ink:${s.hero.ink};--hero-sub:${s.hero.sub};--hero-kick:${s.hero.kick}`
    +`;--chip-bg:${s.hero.chipBg};--chip-ink:${s.hero.chipInk};--chip-line:${s.hero.chipLine}`;

  // primitives
  let prim="";
  for(const [g,arr] of Object.entries(s.primitives)){
    prim+=`<h3 class="grp">${g}</h3><div class="swatches">`+
      arr.map(([n,h])=>swatch(n,h,null,false)).join("")+`</div>`;
  }
  // semantic
  let sem="";
  for(const [g,keys] of SEM_GROUPS){
    const ks=keys.filter(k=>V[k]);
    if(!ks.length)continue;
    sem+=`<h3 class="grp">${g}</h3><div class="swatches sem">`+
      ks.map(k=>swatch("color/"+k.replace(/-/g,"/"),V[k],k,true)).join("")+`</div>`;
  }
  // charts
  const chartBars=s.charts.map((c,i)=>`<div class="bar" title="${c[0]} ${c[1]}" style="background:${c[1]};height:${38+i*11}%"></div>`).join("");
  const chartLegend=s.charts.map(c=>`<span class="pill" style="background:var(--surface-pill);color:var(--text-secondary)"><span class="pill-dot" style="background:${c[1]}"></span>${c[0]}</span>`).join("");

  const webBlock = s.web ? `
    <section class="block"><div class="wrap">
      <p class="eyebrow">06 — Web patterns</p><h2 class="sec">Marketing surfaces</h2>
      <p class="sec-note">Navigation and hero patterns as they appear on zuper.co — warm gradient grounds with a single orange call‑to‑action.</p>
      <div class="web-nav">
        <div class="wlogo">${logo("dark",22)}</div>
        <div class="links"><span>Product</span><span>Solutions</span><span>Pricing</span><span>Resources</span></div>
        <div class="spacer"></div>
        <button class="btn btn-ghost">Sign in</button>
        <button class="btn btn-primary">Book a demo</button>
      </div>
      <div class="web-hero">
        <h3>Field service, intelligently automated</h3>
        <p>Schedule, dispatch and invoice from one platform — with AI that turns every job into data your team can act on.</p>
        <div class="row"><button class="btn btn-primary">Start free trial</button><button class="btn btn-secondary">Watch overview</button></div>
      </div>
    </div></section>`:"";

  if(s.id==="sense-dark"){
    stage.style.cssText=varStyle
      +`;--hero-bg:linear-gradient(180deg,rgba(9,9,11,.30) 0%,rgba(9,9,11,.62) 60%,rgba(9,9,11,.86) 100%),${SENSE_BG_CSS}`
      +`;--c-canvas:#09090B`;
  } else if(s.id==="deck-orange"){
    stage.style.cssText=varStyle
      +`;--hero-bg:linear-gradient(105deg,rgba(20,4,3,.34),rgba(20,4,3,0) 55%),${ORANGE_BG_CSS}`;
  } else {
    stage.style.cssText=varStyle;
  }
  const senseSlideBg=s.id==="sense-dark"?` style="background:linear-gradient(180deg,rgba(9,9,11,.25),rgba(9,9,11,.70)),${SENSE_BG_CSS}"`
    :s.id==="deck-orange"?` style="background:${ORANGE_BG_CSS}"`:``;
  stage.innerHTML=`
  <header class="sys-hero">
    <div class="inner">
      <div style="margin-bottom:22px">${logo(face.logo,30)}</div>
      <p class="kicker">${s.tagline}</p>
      <h1>${s.name.replace(/·/g,"·")}</h1>
      <p class="lede">${s.lede}</p>
      <div class="chips">
        <span class="chip"><span class="swt" style="background:${V['brand-default']}"></span>brand ${V['brand-default']}</span>
        ${fl.ppt?`<span class="chip">PowerPoint deck</span>`:``}
        <span class="chip">Aa ${esc(fl.display)} · display</span>
        <span class="chip">Aa ${esc(fl.body)} · body</span>
        <span class="chip">canvas ${s.canvas}</span>
      </div>
      ${s.id==="sense-dark"?`<div class="hero-note">Canvas set on the Zuper Sense signature light‑bars background — embedded here and reused on every dark slide.</div>`:``}
    </div>

      </div>
    </div>
  </div></section>
  <div style="height:60px"></div>`;

  // ---- signature renderer (inline styles + hosted PNG, so it survives copy/paste into Outlook/Gmail) ----
  // preview/picker use relative paths (load from same origin as this page); copy rewrites them to absolute raw URLs
  const RAW="https://raw.githubusercontent.com/karthiseyon/zuper-dls/main/";
  const toAbs=html=>html.replace(/(src|href)="assets\//g,'$1="'+RAW+'assets/');
  const esImg=`<img src="assets/email/zuper-vertical-tight.png" alt="Zuper" width="100" height="69" style="display:block;border:0;outline:none;-ms-interpolation-mode:bicubic" />`;
  const BAN={sense:{u:"assets/email/zuper-emailer-sense.png",a:"Introducing Zuper Sense — Monitor. Analyze. Predict. Recommend"},trades:{u:"assets/email/zuper-emailer-trades.png",a:"Zuper — The AI Operating System for the Skilled Trades"}};
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function sigHTML(d){
    const A='color:#FD5000', INK='#191919', SUB='#5b6470';
    const rows=[];
    rows.push(`<div style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:bold;color:${INK};line-height:1.25">${esc(d.name||"Your Name")}</div>`);
    if(d.title)rows.push(`<div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:bold;${A};margin-top:2px;line-height:1.3">${esc(d.title)}</div>`);
    const contact=[];
    if(d.email)contact.push(`<a href="mailto:${esc(d.email)}" style="color:${SUB};text-decoration:none">${esc(d.email)}</a>`);
    if(d.phone)contact.push(`<span style="color:${SUB}">${esc(d.phone)}</span>`);
    if(contact.length)rows.push(`<div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:${SUB};margin-top:9px;line-height:1.4">${contact.join('<span style="color:#c9c3ba">&nbsp;|&nbsp;</span>')}</div>`);
    if(d.cta)rows.push(`<div style="margin-top:11px"><a href="https://www.zuper.co/contact-us" style="font-family:Arial,Helvetica,sans-serif;display:inline-block;background:#FD5000;color:#ffffff;text-decoration:none;font-size:12px;font-weight:bold;padding:8px 16px;border-radius:7px">Book a demo →</a></div>`);
    const sig=`<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif"><tr>`
      +`<td style="vertical-align:middle;padding:0 14px 0 0">${esImg}</td>`
      +`<td style="vertical-align:middle;padding:0 0 0 14px;border-left:2px solid #FD5000">${rows.join("")}</td>`
      +`</tr></table>`;
    const b=BAN[d.banner];
    if(!b)return sig;
    const esBanner=`<a href="https://www.zuper.co" style="text-decoration:none"><img src="${b.u}" alt="${esc(b.a)}" width="380" height="95" style="display:block;border:0;outline:none;-ms-interpolation-mode:bicubic;border-radius:8px" /></a>`;
    return `<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse"><tr><td style="padding:0 0 14px 0">${sig}</td></tr><tr><td>${esBanner}</td></tr></table>`;
  }
  const $=id=>document.getElementById(id);
  function read(){const br=document.querySelector('input[name="esb"]:checked');return{name:$("es-name").value.trim(),title:$("es-title").value.trim(),email:$("es-email").value.trim(),phone:$("es-phone").value.trim(),cta:$("es-cta").checked,banner:br?br.value:"none"};}
  function render(){$("es-preview").innerHTML=sigHTML(read());}
  ["es-name","es-title","es-email","es-phone"].forEach(id=>$(id).addEventListener("input",render));
  $("es-cta").addEventListener("change",render);
  [...document.querySelectorAll('input[name="esb"]')].forEach(r=>r.addEventListener("change",render));
  render();

  // ---- copy handlers ----
  const flash=(btn,msg)=>{const o=btn.innerHTML;btn.innerHTML=msg;setTimeout(()=>{btn.innerHTML=o;},1700);};
  function selectAndCopy(node){const r=document.createRange();r.selectNode(node);const s=window.getSelection();s.removeAllRanges();s.addRange(r);let ok=false;try{ok=document.execCommand("copy");}catch(_){}s.removeAllRanges();return ok;}
  $("es-copy").addEventListener("click",function(){
    const node=$("es-preview"),html=toAbs(node.innerHTML),btn=this;
    const done=()=>flash(btn,'Copied ✓'),fail=()=>{selectAndCopy(node)?done():flash(btn,'Press ⌘/Ctrl+C');};
    if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write){
      const item=new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([node.innerText],{type:"text/plain"})});
      navigator.clipboard.write([item]).then(done).catch(fail);
    }else{fail();}
  });
  window.scrollTo(0,0);
}

    function draw(){stg.style.background=lum(st.color)>0.68?"#2b2b2f":"#F4EEE6";stg.innerHTML=`<svg viewBox="0 0 256 256" width="${st.size}" height="${st.size}" fill="${st.color}" style="display:block">${glyph(st.name)}</svg>`;nm.textContent=st.name;dim.textContent=st.size+"px";}
    function svgStr(){return `<svg xmlns="http://www.w3.org/2000/svg" width="${st.size}" height="${st.size}" viewBox="0 0 256 256" fill="${st.color}">${glyph(st.name)}</svg>`;}
    function cells(list){pick.innerHTML=list.map(n=>`<button class="icst-cell${n===st.name?" on":""}" data-n="${n}" title="${n}"><svg viewBox="0 0 256 256" width="26" height="26" fill="currentColor">${glyph(n)}</svg></button>`).join("");}
    function setMeta(){meta.textContent=window.PHOSPHOR?`${Object.keys(window.PHOSPHOR).length.toLocaleString()} icons · search by name or keyword`:"Loading icons…";}
    function search(q){q=(q||"").trim().toLowerCase();const src=window.PHOSPHOR?Object.keys(window.PHOSPHOR):LOCAL;const T=window.PHOSPHOR_TAGS||{};
      if(!q){cells(LOCAL);setMeta();return;}
      const starts=[],has=[],tag=[];
      src.forEach(n=>{if(n.indexOf(q)===0)starts.push(n);else if(n.indexOf(q)>0)has.push(n);else if(T[n]&&T[n].indexOf(q)>=0)tag.push(n);});
      let m=starts.concat(has,tag);
      Object.keys(SYN).forEach(k=>{if(k.indexOf(q)>=0||q.indexOf(k)>=0){for(const n of SYN[k].slice().reverse()){if(src.indexOf(n)>=0){const i=m.indexOf(n);if(i>=0)m.splice(i,1);m.unshift(n);}}}});
      const total=m.length;m=m.slice(0,200);
      meta.textContent=total?`${total} result${total>1?"s":""} for “${q}”${total>200?" · showing 200":""}`:`No icons match “${q}”`;
      cells(m);}
    pick.addEventListener("click",e=>{const b=e.target.closest(".icst-cell");if(!b)return;[...pick.children].forEach(c=>c.classList.remove("on"));b.classList.add("on");st.name=b.dataset.n;draw();});
    $("icstSearch").addEventListener("input",e=>search(e.target.value));
    const chip=$("icstChip"),hex=$("icstHex"),nat=$("icstColor");
    function setColor(c,sw){st.color=c;if(chip)chip.style.background=c;if(hex&&document.activeElement!==hex)hex.value=c.toUpperCase();if(nat&&/^#[0-9a-f]{6}$/i.test(c))nat.value=c.toLowerCase();$("icstSws").querySelectorAll(".icst-sw").forEach(x=>x.classList.toggle("on",sw===x));draw();}
    $("icstSws").addEventListener("click",e=>{const s=e.target.closest(".icst-sw[data-col]");if(!s)return;setColor(s.dataset.col,s);});
    nat.addEventListener("input",e=>setColor(e.target.value,null));
    hex.addEventListener("input",e=>{const v=e.target.value.trim().replace(/^#/,"");if(/^[0-9a-fA-F]{6}$/.test(v))setColor("#"+v,null);else if(/^[0-9a-fA-F]{3}$/.test(v))setColor("#"+v.split("").map(x=>x+x).join(""),null);});
    $("icstSize").addEventListener("input",e=>{st.size=+e.target.value;$("icstSizeV").value=st.size;draw();});
    $("icstSizeV").addEventListener("input",e=>{let v=parseInt(e.target.value,10);if(isNaN(v))return;if(v>256){v=256;e.target.value=256;}st.size=v;$("icstSize").value=Math.max(16,Math.min(256,v));draw();});
    $("icstSizeV").addEventListener("blur",e=>{let v=parseInt(e.target.value,10);if(isNaN(v)||v<16)v=16;if(v>256)v=256;e.target.value=v;st.size=v;$("icstSize").value=v;draw();});
    const flash=b=>{const o=b.innerHTML;b.classList.add("done");b.textContent="Copied ✓";setTimeout(()=>{b.classList.remove("done");b.innerHTML=o;},1400);};
    function dl(blob,fn){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(u);a.remove();},1200);}
    function rasterize(cb){const s=st.size,sc=Math.max(2,Math.ceil(512/s)),cv=document.createElement("canvas");cv.width=s*sc;cv.height=s*sc;const ctx=cv.getContext("2d"),img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,cv.width,cv.height);cv.toBlob(cb);};img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svgStr());}
    document.querySelector(".icst-exp").addEventListener("click",e=>{const b=e.target.closest(".icst-btn");if(!b)return;const x=b.dataset.exp;
      if(x==="svg"&&navigator.clipboard){navigator.clipboard.writeText(svgStr());flash(b);}
      else if(x==="copy-png"){rasterize(bl=>{try{navigator.clipboard.write([new ClipboardItem({"image/png":bl})]).then(()=>flash(b)).catch(()=>{});}catch(_){}});}
      else if(x==="dl-svg"){dl(new Blob([svgStr()],{type:"image/svg+xml"}),`zuper-${st.name}.svg`);}
      else if(x==="dl-png"){rasterize(bl=>dl(bl,`zuper-${st.name}.png`));}
    });
    cells(LOCAL);draw();setMeta();
    if(!window.PHOSPHOR&&!window.__phLoad){window.__phLoad=1;const s=document.createElement("script");s.src="assets/phosphor-icons.js";s.onload=()=>{const si=$("icstSearch");if(si&&document.body.contains(si)){setMeta();search(si.value);}};document.body.appendChild(s);}
  })();
  window.scrollTo(0,0);
}

let _io;
function revealSections(){
  if(_io)_io.disconnect();
  const secs=[...stage.querySelectorAll("section.block")];
  secs.forEach(s=>s.classList.add("reveal"));
  if(!("IntersectionObserver" in window)){secs.forEach(s=>s.classList.add("in"));return;}
  _io=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");_io.unobserve(e.target);}});},{rootMargin:"0px 0px -7% 0px"});
  secs.forEach(s=>_io.observe(s));
}
const NAVIC={overview:"home",deck:"monitor",website:"globe",humans:"users",icons:"grid",use:"cpu","one-pager":"doc",social:"megaphone",emailer:"chat","email-sig":"mail","logo-usage":"shield",assets:"download"};

function zDownload(url,name){
  var nm=name||url.split("/").pop();
  fetch(url).then(function(r){if(!r.ok)throw 0;return r.blob();}).then(function(b){
    var u=URL.createObjectURL(b),a=document.createElement("a");
    a.href=u;a.download=nm;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(u);a.remove();},1500);
  }).catch(function(){
    var a=document.createElement("a");a.href=url;a.download=nm;document.body.appendChild(a);a.click();a.remove();
  });
}

/* in-page section nav + scrollspy */
function buildSubnav(id){
  nav.querySelectorAll(".subnav").forEach(n=>n.remove());
  const btn=nav.querySelector(`button[data-id="${id}"]`);
  const secs=[...stage.querySelectorAll("section.block")];
  if(!btn||!secs.length)return;
  const sub=document.createElement("div");sub.className="subnav";
  secs.forEach((sec,i)=>{
    const hh=sec.querySelector("h2.sec");if(!hh)return;
    const sid=`s-${id}-${i}`;sec.id=sid;sec.style.scrollMarginTop="22px";
    const a=document.createElement("a");a.href="#"+sid;
    a.textContent=hh.textContent.replace(/^\s*\d+\s*[·—\-]\s*/,"");
    a.addEventListener("click",ev=>{ev.preventDefault();sec.scrollIntoView({behavior:"smooth",block:"start"});});
    sub.appendChild(a);
  });
  btn.insertAdjacentElement("afterend",sub);
  requestAnimationFrame(spy);
}
function spy(){
  const links=[...nav.querySelectorAll(".subnav a")];if(!links.length)return;
  let cur=links[0];
  for(const l of links){const t=document.getElementById(l.getAttribute("href").slice(1));if(t&&t.getBoundingClientRect().top<150)cur=l;}
  links.forEach(l=>l.classList.toggle("cur",l===cur));
}
let _spyR;window.addEventListener("scroll",()=>{cancelAnimationFrame(_spyR);_spyR=requestAnimationFrame(spy);},{passive:true});
